// ── STORES ────────────────────────────────────────────────────────────────────
function useMedia(){
  const[store,setStore]=useState({});
  const add=useCallback((eid,files)=>{
    const arr=Array.from(files).filter(f=>f.type.startsWith("image/")||f.type.startsWith("video/"));
    if(!arr.length)return;
    setStore(p=>({...p,[eid]:[...(p[eid]||[]),...arr.map(f=>({id:"m"+Date.now()+Math.random().toString(36).slice(2),type:f.type.startsWith("video/")?"video":"photo",url:URL.createObjectURL(f),name:f.name}))]}));
  },[]);
  const remove=useCallback((eid,mid)=>{setStore(p=>({...p,[eid]:(p[eid]||[]).filter(m=>m.id!==mid)}));},[]);
  const count=useCallback(eid=>(store[eid]||[]).length,[store]);
  const total=useMemo(()=>Object.values(store).reduce((s,a)=>s+a.length,0),[store]);
  return{store,add,remove,count,total};
}

function useChecked(){
  const[ch,setCh]=useState({});
  const toggle=useCallback(id=>{setCh(p=>({...p,[id]:!p[id]}));},[]);
  const isChecked=useCallback(id=>!!ch[id],[ch]);
  const countDay=useCallback(day=>EVENTS.filter(e=>e.day===day&&ch[e.id]).length,[ch]);
  return{toggle,isChecked,countDay};
}

// ── REAL MAP (Leaflet + CartoDB dark tiles) ───────────────────────────────────

function CityMapLeaflet({city,events,mediaStore,checked,onPinTap,selectedId}){
  const mapDivRef=useRef(null);
  const instanceRef=useRef(null);
  const routeRef=useRef(null);
  const markersRef=useRef({});
  const col=city==="ist"?P.ist:P.kl;
  const {isChecked}=checked;

  // Init map once
  useEffect(()=>{
    if(!mapDivRef.current||instanceRef.current)return;
    const lats=events.map(e=>e.lat);
    const lngs=events.map(e=>e.lng);
    const cLat=(Math.min(...lats)+Math.max(...lats))/2;
    const cLng=(Math.min(...lngs)+Math.max(...lngs))/2;
    const map=L.map(mapDivRef.current,{
      center:[cLat,cLng],
      zoom:city==="ist"?14:12,
      zoomControl:false,
      attributionControl:true,
    });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
      attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains:"abcd",
      maxZoom:20,
    }).addTo(map);
    L.control.zoom({position:"bottomright"}).addTo(map);
    if(events.length>1){
      const bounds=L.latLngBounds(events.map(e=>[e.lat,e.lng]));
      map.fitBounds(bounds,{padding:[32,32]});
    }
    instanceRef.current=map;
    return()=>{
      map.remove();
      instanceRef.current=null;
      markersRef.current={};
      routeRef.current=null;
    };
  },[]);// eslint-disable-line react-hooks/exhaustive-deps

  // Update markers & route when state changes
  useEffect(()=>{
    const map=instanceRef.current;
    if(!map)return;
    if(routeRef.current){routeRef.current.remove();routeRef.current=null;}
    Object.values(markersRef.current).forEach(m=>m.remove());
    markersRef.current={};
    if(events.length>1){
      routeRef.current=L.polyline(events.map(e=>[e.lat,e.lng]),{
        color:col,weight:2,dashArray:"6,5",opacity:0.5,
      }).addTo(map);
    }
    events.forEach(ev=>{
      const done=isChecked(ev.id);
      const isSel=selectedId===ev.id;
      const pinCol=done?"#2A7A40":col;
      const sz=isSel?38:30;
      const border=isSel?"2px solid #fff":`2px solid ${pinCol}88`;
      const shadow=isSel?`0 0 0 3px ${pinCol}44,0 4px 14px #000C`:"0 2px 8px #000A";
      const photos=(mediaStore[ev.id]||[]).filter(m=>m.type==="photo");
      const lastPhoto=photos[photos.length-1];
      const photoHtml=lastPhoto?`<div style="position:absolute;bottom:${sz+6}px;left:50%;transform:translateX(-50%);width:46px;height:46px;border-radius:50%;border:2px solid ${pinCol};overflow:hidden;box-shadow:0 2px 10px #000A;cursor:pointer"><img src="${lastPhoto.url}" style="width:100%;height:100%;object-fit:cover"/>${photos.length>1?`<div style="position:absolute;bottom:2px;right:2px;background:#000A;border-radius:8px;padding:1px 4px;font-size:8px;color:#fff;font-family:sans-serif">+${photos.length-1}</div>`:"" }</div>`:"";
      const labelHtml=isSel?`<div style="position:absolute;top:${sz+5}px;left:50%;transform:translateX(-50%);background:#0D0D14EE;border:1px solid ${col};border-radius:8px;padding:3px 8px;white-space:nowrap;font-size:9px;color:${col};font-family:sans-serif;font-weight:700;box-shadow:0 2px 8px #000A">${ev.emoji} ${ev.title.length>20?ev.title.slice(0,20)+"…":ev.title}</div>`:"";
      const html=`<div style="position:relative;width:${sz}px;height:${sz}px">${photoHtml}<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${pinCol};border:${border};box-shadow:${shadow};display:flex;align-items:center;justify-content:center;font-size:${isSel?13:10}px;color:#fff;font-weight:700;font-family:sans-serif;cursor:pointer">${done?"✓":ev.order}</div>${labelHtml}</div>`;
      const icon=L.divIcon({
        className:"",
        html,
        iconSize:[sz,sz],
        iconAnchor:[sz/2,sz/2],
      });
      const marker=L.marker([ev.lat,ev.lng],{icon,zIndexOffset:isSel?1000:0})
        .addTo(map)
        .on("click",()=>onPinTap(ev));
      markersRef.current[ev.id]=marker;
    });
  },[events,isChecked,selectedId,mediaStore,col,onPinTap]);

  return(
    <div style={{position:"relative",width:"100%",height:"100%"}}>
      <div ref={mapDivRef} style={{width:"100%",height:"100%",borderRadius:10,overflow:"hidden"}}/>
      <div style={{position:"absolute",top:8,left:8,zIndex:500,background:"#08080ECC",border:`1px solid ${col}44`,borderRadius:8,padding:"3px 9px",fontSize:9,color:col,fontFamily:"sans-serif",fontWeight:700,letterSpacing:1,pointerEvents:"none"}}>
        {city==="ist"?"🇹🇷 Istanbul":"🇲🇾 Kuala Lumpur"}
      </div>
    </div>
  );
}

// ── STOP CARD ─────────────────────────────────────────────────────────────────
function StopCard({ev,checked,onToggle,onSelect,mediaCount,isSelected}){
  const done=checked.isChecked(ev.id);
  const col=ev.city==="ist"?P.ist:P.kl;
  const cnt=mediaCount(ev.id);
  return(
    <div onClick={()=>onSelect(ev)} style={{background:isSelected?col+"18":done?"#0A1A0A":P.card,border:`1px solid ${isSelected?col:done?P.kl+"44":P.border}`,borderRadius:10,marginBottom:5,overflow:"hidden",transition:"all .2s",cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"stretch"}}>
        <button onClick={e=>{e.stopPropagation();onToggle(ev.id);}} style={{width:38,flexShrink:0,background:done?"#1A3A1A":"#0C0C14",border:"none",borderRight:`1px solid ${P.border}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
          <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${done?P.kl:P.muted}`,background:done?P.kl:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",transition:"all .2s"}}>{done?"✓":""}</div>
          <div style={{fontSize:8,color:done?P.kl:col,fontFamily:"sans-serif",fontWeight:700}}>{ev.order}</div>
        </button>
        <div style={{flex:1,padding:"8px 10px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
            <span style={{fontSize:15}}>{ev.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:done?P.muted:P.text,fontWeight:600,lineHeight:1.3,textDecoration:done?"line-through":"none"}}>{ev.title}</div>
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:9,background:col+"1A",border:`1px solid ${col}44`,color:col,padding:"2px 7px",borderRadius:8,fontFamily:"sans-serif",fontWeight:700}}>{ev.arrive} – {ev.leave}</span>
                {ev.travelNext&&<span style={{fontSize:9,color:"#5DC890",fontFamily:"sans-serif"}}>→ {ev.travelNext}</span>}
                {cnt>0&&<span style={{fontSize:9,color:col,fontFamily:"sans-serif"}}>📷 {cnt}</span>}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAP VIEW (map + list side by side) ───────────────────────────────────────
function MapView({dayFilter,checked,onToggle,media,onOpenDrawer}){
  const[selectedId,setSelectedId]=useState(null);
  const listRef=useRef(null);
  const cardRefs=useRef({});

  const evs=useMemo(()=>dayFilter?EVENTS.filter(e=>e.day===dayFilter):EVENTS,[dayFilter]);
  const istEvs=useMemo(()=>evs.filter(e=>e.city==="ist"),[evs]);
  const klEvs=useMemo(()=>evs.filter(e=>e.city==="kl"),[evs]);
  const showIst=istEvs.length>0;
  const showKL=klEvs.length>0;
  const both=showIst&&showKL;

  const handlePinTap=useCallback(ev=>{
    setSelectedId(prev=>prev===ev.id?null:ev.id);
    // Scroll list to card
    setTimeout(()=>{
      const el=cardRefs.current[ev.id];
      if(el&&listRef.current) el.scrollIntoView({behavior:"smooth",block:"nearest"});
    },50);
  },[]);

  const handleCardSelect=useCallback(ev=>{
    setSelectedId(prev=>prev===ev.id?null:ev.id);
  },[]);

  const handleOpenDetail=useCallback(ev=>{
    onOpenDrawer(ev);
  },[onOpenDrawer]);

  const total=evs.filter(e=>checked.isChecked(e.id)).length;
  const days=dayFilter?[dayFilter]:Object.keys(DAY_META);

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Map area */}
      <div style={{flex:"0 0 52%",display:"flex",flexDirection:"column",gap:4,padding:"6px 8px 0",minHeight:0}}>
        {showIst&&(
          <div style={{flex:both?1:2,minHeight:0,borderRadius:10,overflow:"hidden"}}>
            <CityMapLeaflet city="ist" events={istEvs} mediaStore={media.store} checked={checked} onPinTap={handlePinTap} selectedId={selectedId}/>
          </div>
        )}
        {both&&<div style={{height:3,flexShrink:0}}/>}
        {showKL&&(
          <div style={{flex:both?1:2,minHeight:0,borderRadius:10,overflow:"hidden"}}>
            <CityMapLeaflet city="kl" events={klEvs} mediaStore={media.store} checked={checked} onPinTap={handlePinTap} selectedId={selectedId}/>
          </div>
        )}
      </div>

      {/* Progress bar */}
      <div style={{padding:"5px 10px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div style={{flex:1,height:3,background:P.border,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${Math.round(total/evs.length*100)}%`,height:"100%",background:P.goldB,borderRadius:2,transition:"width .4s"}}/>
        </div>
        <span style={{fontSize:9,color:P.goldB,fontFamily:"sans-serif",fontWeight:700,flexShrink:0}}>{total}/{evs.length}</span>
      </div>

      {/* Stops list */}
      <div ref={listRef} style={{flex:1,overflowY:"auto",padding:"0 8px 10px",minHeight:0}}>
        {days.map(day=>{
          const meta=DAY_META[day];
          const dayEvs=EVENTS.filter(e=>e.day===day);
          if(!dayEvs.length)return null;
          const doneN=checked.countDay(day);
          return(
            <div key={day} style={{marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 2px",marginBottom:4}}>
                <div style={{fontSize:9,letterSpacing:2,color:meta.color,textTransform:"uppercase",fontFamily:"sans-serif",fontWeight:700}}>{meta.label} — {meta.name}</div>
                <div style={{fontSize:9,color:doneN===dayEvs.length?P.kl:P.muted,fontFamily:"sans-serif"}}>{doneN}/{dayEvs.length}</div>
              </div>
              {dayEvs.map(ev=>(
                <div key={ev.id} ref={el=>cardRefs.current[ev.id]=el}>
                  <StopCard
                    ev={ev}
                    checked={checked}
                    onToggle={onToggle}
                    onSelect={ev=>{handleCardSelect(ev);handleOpenDetail(ev);}}
                    mediaCount={media.count}
                    isSelected={selectedId===ev.id}
                  />
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── EVENT DRAWER ──────────────────────────────────────────────────────────────
function MediaPanel({event,store,add,remove}){
  const fileRef=useRef(null),[lb,setLb]=useState(null);
  const items=store[event.id]||[],col=event.city==="ist"?P.ist:P.kl;
  return(<div>
    <div onClick={()=>fileRef.current?.click()} onDrop={e=>{e.preventDefault();add(event.id,e.dataTransfer.files);}} onDragOver={e=>e.preventDefault()} style={{border:`1.5px dashed ${col}55`,borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer",background:col+"08",marginBottom:8}}>
      <div style={{fontSize:20}}>📷</div>
      <div style={{fontSize:11,color:P.muted,marginTop:4,fontFamily:"sans-serif",lineHeight:1.4}}>Tap to add photos & videos<br/><span style={{fontSize:9,color:col+"88"}}>First photo appears as bubble on the map pin</span></div>
      <input ref={fileRef} type="file" accept="image/*,video/*" multiple style={{display:"none"}} onChange={e=>{add(event.id,e.target.files);e.target.value="";}}/>
    </div>
    <a href={DRIVE_URL} target="_blank" rel="noreferrer" style={{display:"block",textAlign:"center",fontSize:9,color:P.kl,marginBottom:8,fontFamily:"sans-serif",opacity:0.8}}>↗ Open Google Drive folder to backup</a>
    {items.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
      {items.map(m=>(<div key={m.id} style={{position:"relative",aspectRatio:"1",borderRadius:7,overflow:"hidden",background:"#1A1A10"}}>
        {m.type==="photo"?<img src={m.url} alt={m.name} onClick={()=>setLb(m)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"pointer"}}/>:<video src={m.url} onClick={()=>setLb(m)} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"pointer"}}/>}
        <button onClick={()=>remove(event.id,m.id)} style={{position:"absolute",top:2,right:2,background:"#C02020BB",border:"none",borderRadius:"50%",width:16,height:16,color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>))}

      {lb.type==="photo"?<img src={lb.url} style={{maxWidth:"100%",maxHeight:"88vh",borderRadius:10,objectFit:"contain"}}/>:<video src={lb.url} controls autoPlay onClick={e=>e.stopPropagation()} style={{maxWidth:"100%",maxHeight:"88vh",borderRadius:10}}/>}
      <button onClick={()=>setLb(null)} style={{position:"absolute",top:18,right:18,background:"#0009",border:"1px solid #444",borderRadius:"50%",width:32,height:32,color:"#fff",fontSize:17,cursor:"pointer"}}>×</button>
    </div>}
  </div>);
}

      <div style={{padding:"10px 16px 28px"}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>

          <div style={{flex:1}}>
            <div style={{fontSize:8,color:col,letterSpacing:2.5,textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:2}}>{dm?.label} · Stop {event.order}</div>
            <div style={{fontSize:14,fontWeight:700,color:P.text,lineHeight:1.3}}>{event.title}</div>
            {event.romantic&&<div style={{fontSize:9,color:P.rose,marginTop:2,fontStyle:"italic"}}>💫 Honeymoon moment</div>}

        </div>

        {/* Timing */}
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {[["ARRIVE",event.arrive,col],["LEAVE",event.leave,col],["COST",event.cost,P.gold]].map(([lbl,val,c])=>(

        {/* Check + Google Maps */}
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <button onClick={()=>onToggle(event.id)} style={{flex:1,padding:"9px",borderRadius:9,border:`1.5px solid ${done?P.kl:col+"66"}`,background:done?"#001A10":col+"14",color:done?P.kl:col,fontSize:11,fontFamily:"sans-serif",cursor:"pointer",fontWeight:700,transition:"all .2s"}}>
            {done?"✓ Done — tap to undo":"○ Mark as done"}
          </button>
          <a href={`https://maps.google.com/?q=${encodeURIComponent(event.mapQ)}`} target="_blank" rel="noreferrer" style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${col}44`,background:col+"0A",color:col,fontSize:11,fontFamily:"sans-serif",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            🗺 Google Maps
          </a>
        </div>

        {/* Detail */}
        <div style={{fontSize:12,color:P.soft,lineHeight:1.75,padding:"10px 12px",background:P.card2,borderRadius:9,marginBottom:8,fontFamily:"sans-serif"}}>{event.detail}</div>
        {event.tip&&<div style={{fontSize:11,padding:"7px 11px",background:"#0A0A1A",borderLeft:`2px solid ${col}`,borderRadius:"0 8px 8px 0",color:"#8898C8",lineHeight:1.5,marginBottom:10,fontFamily:"sans-serif"}}>💡 {event.tip}</div>}
        {event.transport&&<div style={{fontSize:10,padding:"5px 10px",background:"#001A10",borderRadius:8,color:"#5DC890",fontFamily:"sans-serif",marginBottom:12}}>🚇 {event.transport}</div>}

        {/* Memories */}

      </div>
    </div>
  );
}

// ── DAY BAR ──────────────────────────────────────────────────────────────────
function DayBar({active,onChange,checked}){
  const opts=[{id:null,label:"All",color:P.gold},...Object.entries(DAY_META).map(([id,m])=>({id,label:m.label,color:m.color}))];
  return(
    <div style={{display:"flex",gap:5,overflowX:"auto",padding:"7px 10px",background:P.bg,borderBottom:`1px solid ${P.border}`,flexShrink:0}}>
      {opts.map(o=>{
        const dayEvs=o.id?EVENTS.filter(e=>e.day===o.id):EVENTS;

        const pct=dayEvs.length?Math.round(done/dayEvs.length*100):0;
        return(
          <button key={o.id||"all"} onClick={()=>onChange(o.id)} style={{padding:"4px 10px",borderRadius:14,whiteSpace:"nowrap",cursor:"pointer",border:`1px solid ${active===o.id?o.color:"#222030"}`,background:active===o.id?o.color+"22":"transparent",color:active===o.id?P.text:P.muted,fontSize:9.5,fontFamily:"sans-serif",flexShrink:0}}>
            {o.label}{pct>0&&<span style={{marginLeft:3,fontSize:8,color:o.color}}>{pct}%</span>}
          </button>
        );
      })}
    </div>
  );
}

// ── INFO VIEW ────────────────────────────────────────────────────────────────
function CheckItem({text}){
  const[c,setC]=useState(false);
  return(<div onClick={()=>setC(p=>!p)} style={{display:"flex",gap:8,padding:"7px 11px",marginBottom:3,background:c?"#001A10":P.card,border:`1px solid ${c?P.kl+"55":P.border}`,borderRadius:8,cursor:"pointer",transition:"all .2s"}}>
    <span style={{color:c?P.kl:"#3A3028",fontSize:14,flexShrink:0}}>{c?"☑":"□"}</span>
    <span style={{fontSize:11,color:c?P.kl:P.soft,lineHeight:1.4,fontFamily:"sans-serif",textDecoration:c?"line-through":"none",opacity:c?0.6:1}}>{text}</span>
  </div>);
}

function InfoView(){
  const[tab,setTab]=useState("budget");
  return(<div style={{flex:1,overflowY:"auto",padding:"12px"}}>
    <div style={{display:"flex",gap:5,marginBottom:12}}>
      {[["budget","💰 Budget"],["checklist","✅ Checklist"],["pack","🎒 Pack"]].map(([t,l])=>(
        <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"6px 0",fontSize:10,fontFamily:"sans-serif",cursor:"pointer",border:`1px solid ${tab===t?P.gold:"#222030"}`,background:tab===t?P.gold+"1A":"transparent",color:tab===t?P.text:P.muted,borderRadius:7}}>{l}</button>
      ))}
    </div>
    {tab==="budget"&&<div>
      {BUDGET.map((r,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 11px",marginBottom:4,borderRadius:8,background:r.bold?"#1A1000":P.card,border:`1px solid ${r.bold?P.gold:P.border}`,gap:8}}>
        <div style={{fontSize:r.bold?12:10,color:r.bold?P.text:P.soft,fontWeight:r.bold?700:400,flex:1,lineHeight:1.4,fontFamily:"sans-serif"}}>{r.cat}</div>
        <div style={{fontSize:r.bold?14:12,color:r.bold?P.goldB:P.gold,fontWeight:700,whiteSpace:"nowrap",fontFamily:"sans-serif"}}>{r.est}</div>
      </div>))}
      <div style={{marginTop:10,padding:"10px 12px",background:"#001A10",border:"1px solid #1A3A28",borderRadius:9,fontSize:11,color:"#6ABF7A",lineHeight:1.5,fontFamily:"sans-serif"}}>✅ Within €900–1,000 budget. Buffer: €95–235.</div>
      <div style={{marginTop:12,padding:"10px 12px",background:"#00100A",border:`1px solid ${P.kl}44`,borderRadius:9}}>
        <div style={{fontSize:11,color:P.kl,fontWeight:700,marginBottom:3}}>📁 Google Drive Folder</div>
        <a href={DRIVE_URL} target="_blank" rel="noreferrer" style={{display:"block",textAlign:"center",padding:"6px 0",borderRadius:7,background:P.kl+"22",border:`1px solid ${P.kl}55`,color:P.kl,fontSize:11,fontFamily:"sans-serif",marginTop:6}}>↗ Open Honeymoon 2026 Folder</a>
      </div>
    </div>}
    {tab==="checklist"&&<div>{CHECKLIST_DATA.map((s,si)=>(<div key={si} style={{marginBottom:16}}>
      <div style={{fontSize:9,color:P.gold,fontWeight:700,marginBottom:6,fontFamily:"sans-serif",letterSpacing:1}}>📅 {s.when.toUpperCase()}</div>
      {s.items.map((item,ii)=><CheckItem key={ii} text={item}/>)}
    </div>))}</div>}
    {tab==="pack"&&<div>
      {["DEET repellent 30%+ — fireflies mangroves","Type G adapter (Malaysia) + Type F adapter (Turkey)","Long sleeves + trousers for firefly night","Sunscreen SPF 50+","Sandals AND closed shoes — cobblestones + 272 steps","Small umbrella — KL afternoon thunderstorms","Neck fan — KL August humidity","Reusable water bottle","Plastic bags for wet swimwear","Printed copies of all bookings","Headache tablets + rehydration sachets"].map((item,i)=>(<div key={i} style={{display:"flex",gap:8,padding:"7px 11px",marginBottom:3,background:P.card,border:`1px solid ${P.border}`,borderRadius:8,fontSize:11,color:P.soft,lineHeight:1.4,fontFamily:"sans-serif"}}><span style={{color:P.gold,flexShrink:0}}>→</span>{item}</div>))}
      <div style={{marginTop:14,padding:"12px",background:"#0A0005",border:"1px solid #3A1A28",borderRadius:10}}>
        <div style={{fontSize:9,color:P.rose,fontWeight:700,marginBottom:8,letterSpacing:1,fontFamily:"sans-serif"}}>⚠️ 3 TRAPS TO AVOID</div>
        {[["No unofficial taxis at IST or KLIA","Aggressive touts at both airports. IST: hotel transfer. KLIA: KLIA Ekspres train."],["No cheap saffron","Real saffron ≥₺200/gram. Cheap = fake turmeric."],["Not Marini's on 57","Not halal. THIRTY8 at Grand Hyatt replaces it — halal, 38F, Petronas views."]].map(([t,d],i)=>(<div key={i} style={{marginBottom:7,padding:"8px 10px",background:"#1A0008",border:"1px solid #3A1A28",borderRadius:8}}><div style={{fontSize:11,color:"#E05050",fontWeight:700,marginBottom:2}}>{t}</div><div style={{fontSize:10,color:"#8A4040",lineHeight:1.4,fontFamily:"sans-serif"}}>{d}</div></div>))}
      </div>
    </div>}
  </div>);
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("map");
  const[dayFilter,setDayFilter]=useState(null);
  const[drawer,setDrawer]=useState(null);
  const media=useMedia();
  const checked=useChecked();
  const total=EVENTS.filter(e=>checked.isChecked(e.id)).length;
  const TABS=[{id:"map",label:"🗺 Map"},{id:"plan",label:"📅 Plan"},{id:"info",label:"✅ Info"}];

  return(
    <div style={{background:P.bg,height:"100dvh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",overflow:"hidden",color:P.text}}>
      {/* Header */}
      <div style={{background:"#0C0C14",padding:"10px 14px 8px",borderBottom:`1px solid ${P.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div>
            <div style={{fontSize:7.5,letterSpacing:3.5,color:P.gold,textTransform:"uppercase",fontFamily:"sans-serif"}}>Honeymoon 2026</div>
            <div style={{fontSize:16,fontWeight:700,color:P.text,marginTop:1}}>Istanbul & Kuala Lumpur</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:8,color:P.muted,fontFamily:"sans-serif"}}>Progress</div>
            <div style={{fontSize:13,color:P.goldB,fontWeight:700}}>{total}/{EVENTS.length} stops</div>
            <a href={DRIVE_URL} target="_blank" style={{fontSize:8,color:P.kl,fontFamily:"sans-serif"}}>↗ Drive {media.total>0?`(${media.total}📷)`:""}</a>
          </div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"6px 0",borderRadius:7,cursor:"pointer",border:`1px solid ${tab===t.id?P.gold:"#222030"}`,background:tab===t.id?P.gold+"1A":"transparent",color:tab===t.id?P.text:P.muted,fontSize:10,fontFamily:"sans-serif",transition:"all .2s"}}>{t.label}</button>))}
        </div>
      </div>

      {tab==="map"&&<DayBar active={dayFilter} onChange={d=>{setDayFilter(d);setDrawer(null);}} checked={checked}/>}

      <div style={{flex:1,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="map"&&<MapView dayFilter={dayFilter} checked={checked} onToggle={checked.toggle} media={media} onOpenDrawer={ev=>{setDrawer(ev);}}/>}
        {tab==="plan"&&<PlanView checked={checked} onToggle={checked.toggle} onSelectEvent={ev=>{setDrawer(ev);setTab("map");}} mediaCount={media.count}/>}
        {tab==="info"&&<InfoView/>}
        {drawer&&<EventDrawer event={drawer} onClose={()=>setDrawer(null)} checked={checked} onToggle={checked.toggle} media={media}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
